name: Playwright Tests

on:
  schedule:
    - cron: "30 10 * * 1-5" # Mon-Fri 2PM IST
  # push:
  #   branches: [master]
  # pull_request:
  #   branches: [master]
  workflow_dispatch: # manual trigger button in GitHub UI

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test --project=chromium
        env:
          ENV: qa
          BASE_URL: ${{ secrets.BASE_URL }}
          APP_USERNAME: ${{ secrets.APP_USERNAME }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_GRANT_TYPE: ${{ secrets.OAUTH_GRANT_TYPE }}
          CONTACT_API_BASE_URL: ${{ secrets.CONTACT_API_BASE_URL }}
          CONTACT_API_USER_NAME: ${{ secrets.CONTACT_API_USER_NAME }}
          CONTACT_API_PASSWORD: ${{ secrets.CONTACT_API_PASSWORD }}

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: reports/html-report/
          retention-days: 30

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30
