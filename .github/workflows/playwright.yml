name: Playwright Tests

on:
  schedule:
    - cron: "40 10 * * 1-5" # Mon-Fri 10.30AM AU
  # push:
  #   branches: [master]
  # pull_request:
  #   branches: [master]
  workflow_dispatch: # manual trigger button in GitHub UI
    inputs:
      environment:
        description: "Select environment"
        required: true
        default: "QA"
        type: choice
        options:
          - QA
          - stage
          - Dev

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.event.inputs.environment || 'QA' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run tests
        run: npx playwright test --project=chromium
        env:
          ENV: ${{ github.event.inputs.environment || 'QA' }}
          BASE_URL: ${{ secrets.BASE_URL }}
          APP_USERNAME: ${{ secrets.APP_USERNAME }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_GRANT_TYPE: ${{ secrets.OAUTH_GRANT_TYPE }}
          CONTACT_API_BASE_URL: ${{ secrets.CONTACT_API_BASE_URL }}
          CONTACT_API_USER_NAME: ${{ secrets.CONTACT_API_USER_NAME }}
          CONTACT_API_PASSWORD: ${{ secrets.CONTACT_API_PASSWORD }}

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report-${{ github.run_id }}
          path: reports/html-report/
          retention-days: 30

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/
          retention-days: 30
